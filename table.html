<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="1">
        <caption>MENU</caption>
        <tr>
            <th rowspan="2">Item</th>
            <th colspan="2">Price</th>
        </tr>
        <tr>
            <td>Rs</td>
            <td>USD</td>
        </tr>
        <tr>
            <td>Pizza</td>
            <td>400</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Burger</td>
            <td>200</td>
            <td>2.5</td>
        </tr>
        <tr>
            <td>Sandwich</td>
            <td>150</td>
            <td>1.5</td>
        </tr>
    </table>
</body>
</html>
